# ============================================================
# Loop Solar — Docker Compose Stack
# ============================================================
# Services: EMQX (MQTT), TimescaleDB, Ingestion, API, Nginx
# ============================================================

version: '3.8'

services:
  # ---- MQTT Broker ----
  emqx:
    image: emqx/emqx:5.3.0
    container_name: loopsolar-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"      # MQTT
      - "8083:8083"      # MQTT WebSocket
      - "18083:18083"    # EMQX Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
    environment:
      EMQX_NAME: loopsolar
      EMQX_HOST: 127.0.0.1
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Time Series Database ----
  timescaledb:
    image: timescale/timescaledb:2.13.0-pg15
    container_name: loopsolar-tsdb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-loopsolar}
      POSTGRES_USER: ${DB_USER:-loopsolar}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loopsolar_secure_2026}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loopsolar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MQTT Ingestion Service ----
  ingestion:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    container_name: loopsolar-ingestion
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_healthy
    environment:
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_INGESTION_USER:-ingestion}
      MQTT_PASSWORD: ${MQTT_INGESTION_PASS:-ingestion_secure_2026}
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-loopsolar}
      DB_USER: ${DB_USER:-loopsolar}
      DB_PASSWORD: ${DB_PASSWORD:-loopsolar_secure_2026}
      NODE_ENV: ${NODE_ENV:-production}
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- API Service ----
  api:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: loopsolar-api
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-loopsolar}
      DB_USER: ${DB_USER:-loopsolar}
      DB_PASSWORD: ${DB_PASSWORD:-loopsolar_secure_2026}
      JWT_SECRET: ${JWT_SECRET:-loopsolar_jwt_secret_change_me}
      MQTT_BROKER: emqx
      MQTT_PORT: 1883
      MQTT_USER: ${MQTT_INGESTION_USER:-ingestion}
      MQTT_PASSWORD: ${MQTT_INGESTION_PASS:-ingestion_secure_2026}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-production}
      OTA_FIRMWARE_DIR: /app/firmware
    volumes:
      - firmware_data:/app/firmware
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/status', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Reverse Proxy ----
  nginx:
    image: nginx:1.25-alpine
    container_name: loopsolar-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  emqx_data:
  tsdb_data:
  firmware_data:
