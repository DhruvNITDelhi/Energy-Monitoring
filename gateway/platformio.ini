; Loop Solar — ESP32 Gateway Firmware
; PlatformIO Configuration

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Partition with OTA support (two app partitions)
board_build.partitions = min_spiffs.csv

lib_deps =
    4-20ma/ModbusMaster@^2.0.1
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_LOOP_STACK_SIZE=8192

; OTA upload configuration (uncomment for remote flashing)
; upload_protocol = espota
; upload_port = <ESP32_IP_ADDRESS>
; upload_flags =
;     --port=3232
;     --auth=loopsolar_ota_2026

; File system upload
board_build.filesystem = spiffs
